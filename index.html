<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST-Bot</title>
<script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b141a;
    color: #e9edef;
    height: 100vh;
    display: flex;
    background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAH0lEQVQoU2NkYGAwZkAD//////9///8KACcIAg0sH8QAAABkSURBVBhPYwCC/4O6AqEQoGQGAI2uQ6Q6JAgQgAEAAgABbGZ2WQAAAABJRU5ErkJggg==');
  }

.app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100vh;
    max-width: 1000px;
    margin: 0 auto;
  }

.chat-header {
    padding: 10px 16px;
    background: #202c33;
    display: flex;
    align-items: center;
    gap: 15px;
    height: 59px;
  }
.chat-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #00a884;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
  }
.chat-info { flex: 1; }
.chat-name { font-size: 16px; }
.chat-status { font-size: 13px; color: #8696a0; }

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 7%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

.msg-row { display: flex; margin-bottom: 12px; }
.msg-row.user { justify-content: flex-end; }
.msg-row.bot { justify-content: flex-start; }

.bubble {
    max-width: 65%;
    padding: 6px 7px 8px 9px;
    border-radius: 7.5px;
    position: relative;
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
  }
.msg-row.user.bubble { background: #005c4b; border-top-right-radius: 0; }
.msg-row.bot.bubble { background: #202c33; border-top-left-radius: 0; }

.bubble-content { font-size: 14.2px; line-height: 19px; white-space: pre-wrap; word-wrap: break-word; }
.bubble-footer { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 2px; }
.msg-time { font-size: 11px; color: #8696a0; }

.upload-bubble {
    background: #202c33;
    border: 1px dashed #374248;
    padding: 16px;
    border-radius: 7.5px;
    text-align: center;
  }
.upload-btn {
    background: #00a884;
    border: none;
    border-radius: 8px;
    color: white;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 8px;
  }
.file-input { display: none; }

.file-bubble {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    min-width: 280px;
  }
.file-icon {
    width: 48px;
    height: 48px;
    background: #00a884;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
.file-info { flex: 1; }
.file-name { font-size: 15px; margin-bottom: 2px; }
.file-size { font-size: 13px; color: #8696a0; }
.download-btn {
    background: #00a884;
    border: none;
    border-radius: 6px;
    color: white;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    margin-top: 6px;
  }

.code-block {
    background: #1e1e1e;
    padding: 8px;
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-size: 12.5px;
    overflow-x: auto;
    margin-top: 4px;
  }
.diff-add { background: rgba(0, 168, 132, 0.2); }
.diff-rem { background: rgba(255, 0, 0, 0.2); text-decoration: line-through; }

.chat-input {
    padding: 5px 16px;
    background: #202c33;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 62px;
  }
.inline-upload {
    margin-top: 0;
    padding: 0;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
.input-box {
    flex: 1;
    background: #2a3942;
    border-radius: 8px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
  }
.input-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e9edef;
    font-size: 15px;
  }
.send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #00a884;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
.send-btn:disabled { background: #374248; cursor: not-allowed; }

.settings-btn {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 50%;
  background: #2a3942;
  color: #e9edef;
  cursor: pointer;
  font-size: 16px;
}
.settings-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99;
}
.settings-card {
  width: min(92vw, 420px);
  background: #202c33;
  border-radius: 10px;
  padding: 16px;
}
.settings-card h3 { margin-bottom: 12px; }
.settings-card label { display: block; font-size: 13px; color: #9cb0ba; margin-bottom: 6px; }
.settings-card input {
  width: 100%;
  background: #2a3942;
  border: 1px solid #374248;
  border-radius: 8px;
  color: #e9edef;
  padding: 10px;
  margin-bottom: 12px;
}
.settings-actions { display: flex; justify-content: flex-end; gap: 8px; }
.settings-actions button {
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
}
#saveSettingsBtn { background: #00a884; color: #fff; }
#closeSettingsBtn { background: #374248; color: #fff; }


  @media (max-width: 768px) {
.bubble { max-width: 85%; }
.chat-messages { padding: 12px 16px; }
.file-bubble { min-width: 220px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="chat-header">
    <div class="chat-avatar">AI</div>
    <div class="chat-info">
      <div class="chat-name">ST-Bot</div>
      <div class="chat-status" id="chatStatus">Aguardando arquivo</div>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Configurações">⚙️</button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input" id="chatInput">
    <input type="file" id="fileInput" class="file-input" accept=".txt,.js,.py,.html,.css,.json,.md">
    <button class="upload-btn inline-upload" id="attachBtn" title="Selecionar arquivo">📎</button>
    <div class="input-box">
      <input type="text" id="userInput" placeholder="Selecione um arquivo, descreva a modificação e envie...">
    </div>
    <button class="send-btn" id="sendBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/>
      </svg>
    </button>
  </div>
</div>


<div class="settings-modal" id="settingsModal">
  <div class="settings-card">
    <h3>Configurações da API</h3>
    <label for="apiKeyInput">Chave da API</label>
    <input type="password" id="apiKeyInput" placeholder="Cole sua chave aqui">
    <label for="modelInput">Modelo</label>
    <input type="text" id="modelInput" placeholder="Ex: gemini-2.5-flash">
    <div class="settings-actions">
      <button id="closeSettingsBtn">Cancelar</button>
      <button id="saveSettingsBtn">Salvar</button>
    </div>
  </div>
</div>

<script>
let apiKey = localStorage.getItem('stbot_api_key') || '';
let modelName = localStorage.getItem('stbot_model_name') || '';

let originalContent = '';
let originalFileName = '';
let modifiedContent = '';
let selectedFile = null;

const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const chatStatus = document.getElementById('chatStatus');
const fileInput = document.getElementById('fileInput');
const attachBtn = document.getElementById('attachBtn');

const settingsBtn = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const apiKeyInput = document.getElementById('apiKeyInput');
const modelInput = document.getElementById('modelInput');
const saveSettingsBtn = document.getElementById('saveSettingsBtn');
const closeSettingsBtn = document.getElementById('closeSettingsBtn');

settingsBtn.addEventListener('click', () => {
  apiKeyInput.value = apiKey;
  modelInput.value = modelName;
  settingsModal.style.display = 'flex';
});

closeSettingsBtn.addEventListener('click', () => {
  settingsModal.style.display = 'none';
});

saveSettingsBtn.addEventListener('click', () => {
  apiKey = apiKeyInput.value.trim();
  modelName = modelInput.value.trim();
  localStorage.setItem('stbot_api_key', apiKey);
  localStorage.setItem('stbot_model_name', modelName);
  settingsModal.style.display = 'none';
  chatStatus.textContent = apiKey && modelName ? 'Configuração salva' : 'Configure API e modelo';
});

window.onload = () => {
  addMsg('Selecione um arquivo, escreva seu pedido e clique em enviar.', 'bot');
  if (!apiKey || !modelName) {
    addMsg('Abra ⚙️ Configurações e salve sua chave API e o modelo antes de enviar.', 'bot');
    chatStatus.textContent = 'Configure API e modelo';
  }
};

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  selectedFile = file;
  originalFileName = file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    originalContent = e.target.result;
    modifiedContent = originalContent;

    addMsg(`Arquivo selecionado: ${file.name} - ${Math.round(file.size/1024)} KB`, 'bot');
    addMsg('Agora descreva a modificação e clique em enviar.', 'bot');
    chatStatus.textContent = 'Pronto para enviar';
    chatMessages.scrollTop = chatMessages.scrollHeight;
  };
  reader.readAsText(file);
}

sendBtn.addEventListener('click', sendRequest);
userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendRequest(); });

async function sendRequest() {
  const instruction = userInput.value.trim();
  if (!apiKey || !modelName) {
    addMsg('Configure e salve a chave API e o modelo em ⚙️ Configurações.', 'bot');
    return;
  }

  if (!instruction || !selectedFile || !originalContent) return;

  addMsg(instruction, 'user');
  userInput.value = '';
  sendBtn.disabled = true;
  chatStatus.textContent = 'Enviando arquivo e pedido...';

  try {
    const patch = await generatePatch(instruction, modifiedContent);
    if (!patch) throw new Error('Modelo não retornou patch válido');

    const newContent = await applyPatchSmart(modifiedContent, patch, instruction);
    modifiedContent = newContent;

    addMsg('Patch aplicado. Aqui está o arquivo modificado:', 'bot');
    addFileMsg(newContent, `modificado_${originalFileName}`);

    chatStatus.textContent = 'Online';
  } catch (err) {
    addMsg(`Erro: ${err.message}`, 'bot');
    chatStatus.textContent = 'Online';
  } finally {
    sendBtn.disabled = false;
  }
}

async function generatePatch(instruction, content) {
  const prompt = `Generate ONLY a robust unified diff patch for this instruction.\nThe patch must be complete and applicable even when creating new functions/blocks from scratch.\nNo explanation, just the diff starting with --- and +++.

Instruction: ${instruction}

File:
\`\`
${content}
\`\`

Diff:`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [{ text: prompt }]
      }],
      generationConfig: {
        temperature: 0.1,
        maxOutputTokens: 8192
      }
    })
  });

  if (!res.ok) throw new Error(`API error: ${res.status}`);

  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
}


async function applyPatchSmart(original, patchText, instruction) {
  const cleanPatch = normalizePatch(patchText);
  const result = Diff.applyPatch(original, cleanPatch);
  if (result !== false) return result;

  const rebuiltFile = await regenerateFullFile(instruction, original);
  if (!rebuiltFile) throw new Error('Patch falhou e não foi possível reconstruir o arquivo');
  return rebuiltFile;
}

function normalizePatch(patchText) {
  const trimmed = patchText.trim();
  if (trimmed.startsWith('```')) {
    return trimmed
      .replace(/^```(?:diff)?\n?/i, '')
      .replace(/\n?```$/, '')
      .trim();
  }
  return trimmed;
}

async function regenerateFullFile(instruction, content) {
  const prompt = `Rewrite the FULL file content to satisfy the user instruction.
Return only the final file text without markdown fences.

Instruction: ${instruction}

Current file:

${content}`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [{ text: prompt }]
      }],
      generationConfig: {
        temperature: 0.2,
        maxOutputTokens: 8192
      }
    })
  });

  if (!res.ok) throw new Error(`API error (fallback): ${res.status}`);

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
  return stripMarkdownFence(text || '');
}

function stripMarkdownFence(text) {
  let output = text.trim();
  if (output.startsWith('```')) {
    const lines = output.split('\n');
    lines.shift();
    if (lines[lines.length - 1]?.trim() === '```') lines.pop();
    output = lines.join('\n').trim();
  }
  return output;
}

function applyPatch(original, patchText) {
  const result = Diff.applyPatch(original, patchText);
  if (result === false) throw new Error('Patch não pôde ser aplicado');
  return result;
}

function addMsg(text, sender, isCode = false) {
  const time = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});

  const row = document.createElement('div');
  row.className = `msg-row ${sender}`;

  let content = `<div class="bubble-content">${escapeHtml(text)}</div>`;
  if (isCode) {
    content = `<div class="code-block">${highlightDiff(text)}</div>`;
  }

  row.innerHTML = `
    <div class="bubble">
      ${content}
      <div class="bubble-footer">
        <span class="msg-time">${time}</span>
      </div>
    </div>
  `;

  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addFileMsg(content, filename) {
  const time = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});
  const size = Math.round(new Blob([content]).size / 1024);

  const row = document.createElement('div');
  row.className = 'msg-row bot';

  row.innerHTML = `
    <div class="bubble">
      <div class="file-bubble">
        <div class="file-icon">
          <svg width="24" height="24" fill="white" viewBox="0 0 24 24">
            <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
          </svg>
        </div>
        <div class="file-info">
          <div class="file-name">${filename}</div>
          <div class="file-size">${size} KB</div>
          <button class="download-btn">Baixar</button>
        </div>
      </div>
      <div class="bubble-footer">
        <span class="msg-time">${time}</span>
      </div>
    </div>
  `;

  row.querySelector('.download-btn').onclick = () => {
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function highlightDiff(text) {
  return text.split('\n').map(line => {
    if (line.startsWith('+') &&!line.startsWith('+++'))
      return `<span class="diff-add">${escapeHtml(line)}</span>`;
    if (line.startsWith('-') &&!line.startsWith('---'))
      return `<span class="diff-rem">${escapeHtml(line)}</span>`;
    return escapeHtml(line);
  }).join('\n');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>

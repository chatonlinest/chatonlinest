<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Semântico Avançado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 160px); }
        .message-appear { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Estilo para mostrar múltiplas partes da resposta */
        .response-part { border-left: 3px solid #10b981; padding-left: 12px; margin-bottom: 8px; }
        .response-part:last-child { margin-bottom: 0; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div class="max-w-md mx-auto bg-white shadow-xl min-h-screen flex flex-col">
        <!-- Header -->
        <div class="bg-gradient-to-r from-emerald-700 to-teal-600 p-4 text-white flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-emerald-700 font-bold shadow-inner">
                    AI
                </div>
                <div>
                    <h1 class="font-bold text-lg">Motor Semântico</h1>
                    <p id="status" class="text-xs text-emerald-200">Indexando vetores...</p>
                </div>
            </div>
            <div class="text-xs bg-white/20 px-2 py-1 rounded-full">NLP Offline</div>
        </div>

        <!-- Chat Window -->
        <div id="chat-window" class="chat-container overflow-y-auto p-4 space-y-4 flex-grow bg-slate-50">
            <div class="flex justify-start">
                <div class="bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm message-appear">
                    Olá! Meu motor de busca semântica está ativo. Não busco apenas palavras iguais, entendo o <b>contexto</b> e a <b>intenção</b> da sua pergunta usando vetores matemáticos.
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-slate-200">
            <form id="chat-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Faça perguntas complexas..." 
                    class="flex-grow p-3 border border-slate-300 rounded-full focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                    autocomplete="off"
                >
                <button type="submit" class="bg-emerald-600 text-white p-3 rounded-full hover:bg-emerald-700 transition-colors shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        let knowledgeBase = [];
        let globalVocabulary = {};
        let globalIdf = {};

        const statusEl = document.getElementById('status');
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const TXT_URL = 'https://dl.dropboxusercontent.com/scl/fi/im7l3p1f1y5bkaguahkrc/cerebro.txt?rlkey=wbgfgq7iiqcl0iroa9i0wqkc7&st=j8x56n5u&dl=0'; 

        const STOPWORDS = new Set(['de','a','o','que','e','do','da','em','um','uma','para','com','não','os','no','se','na','por','mais','dos','como','mas','foi','ao','ele','das','tem','à','seu','sua','ou','ser','quando','muito','nos','já','eu','também','só','pelo','pela','até','isso','ela','entre','era','depois','sem','mesmo','nos','seus','quem','nas','me','esse','eles','estão','você','tinha','foram','essa','num','nem','suas','meu','às','minha','têm','numa','pelos','elas','havia','serei','q','bom','oi','ola','olá','hey','ai','td','blz','vc','pq','porque','mt','ta','tá','nd','nada','aqui','isso','isto','aquilo','la','lá','outro','outra','todo','toda','todos','todas','ter','teve','pode','podem','ir','vou','fiz','faz','fazer']);

        // 1. Stemming Avançado para Português (Sufixos Regressivos)
        function advancedStem(word) {
            word = word.toLowerCase().replace(/[áàãâ]/g,'a').replace(/[éèê]/g,'e').replace(/[íìî]/g,'i').replace(/[óòõô]/g,'o').replace(/[úùû]/g,'u').replace(/[ç]/g,'c');
            if (word.length <= 3) return word;
            
            // Lemma de verbos irregulares comuns
            const lemmas = { 'estar':'est', 'estao':'est', 'estão':'est', 'fiquei':'fic', 'tinha':'ter', 'houve':'havr', 'faz':'faz', 'feito':'faz' };
            if (lemmas[word]) return lemmas[word];

            // Cortes de sufixos progressivos (do maior para o menor)
            if (word.length > 8 && (word.endsWith('amentos') || word.endsWith('imentos'))) return word.slice(0, -6);
            if (word.length > 7 && (word.endsWith('adora') || word.endsWith('adores') || word.endsWith('ação') || word.endsWith('acoes'))) return word.slice(0, -4);
            if (word.length > 6 && (word.endsWith('mente') || word.endsWith('idade') || word.endsWith('anzas'))) return word.slice(0, -5);
            if (word.length > 5 && (word.endsWith('ando') || word.endsWith('endo') || word.endsWith('indo') || word.endsWith('adoras'))) return word.slice(0, -4);
            if (word.length > 4 && (word.endsWith('ado') || word.endsWith('ido') || word.endsWith('ura') || word.endsWith('oso') || word.endsWith('icao'))) return word.slice(0, -3);
            if (word.length > 3 && (word.endsWith('as') || word.endsWith('os') || word.endsWith('am') || word.endsWith('em') || word.endsWith('im') || word.endsWith('om') || word.endsWith('ais'))) return word.slice(0, -2);
            if (word.length > 2 && (word.endsWith('a') || word.endsWith('o') || word.endsWith('e') || word.endsWith('i') || word.endsWith('u'))) return word.slice(0, -1);
            
            return word;
        }

        // 2. Extração com Bigramas (Captura contexto de frases)
        function extractTokens(text) {
            const words = text.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w.length > 1 && !STOPWORDS.has(w));
            const tokens = [];
            const stems = words.map(w => advancedStem(w));
            
            stems.forEach((s, i) => {
                tokens.push(s); // Unigrama
                if (i < stems.length - 1) {
                    tokens.push(`${s}_${stems[i+1]}`); // Bigrama (ex: "troc_senh")
                }
            });
            return tokens;
        }

        // 3. Cálculo TF-IDF (Term Frequency - Inverse Document Frequency)
        function calculateTFIDF(tokens) {
            const tf = {};
            tokens.forEach(t => { tf[t] = (tf[t] || 0) + 1; });
            const vector = {};
            for (const term in tf) {
                vector[term] = (tf[term] / tokens.length) * (globalIdf[term] || 1.0);
            }
            return vector;
        }

        // 4. Similaridade do Cosseno (Compara vetores matemáticos)
        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, normA = 0, normB = 0;
            const allKeys = new Set([...Object.keys(vecA), ...Object.keys(vecB)]);
            for (const key of allKeys) {
                const a = vecA[key] || 0;
                const b = vecB[key] || 0;
                dotProduct += a * b;
                normA += a * a;
                normB += b * b;
            }
            if (normA === 0 || normB === 0) return 0;
            return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        // 5. Carregamento e Indexação da Base
        async function loadKnowledge() {
            try {
                const response = await fetch(TXT_URL);
                if (!response.ok) throw new Error('Falha no download');
                const text = await response.text();
                
                // Separa blocos por linhas em branco
                const rawBlocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(b => b.length > 20);
                
                // Processa tokens para cada bloco
                const docTokens = rawBlocks.map(block => extractTokens(block));
                
                // Calcula IDF global (quão rara/informativa é a palavra em toda a base)
                const docFreq = {};
                docTokens.forEach(tokens => {
                    const unique = new Set(tokens);
                    unique.forEach(t => { docFreq[t] = (docFreq[t] || 0) + 1; });
                });
                const totalDocs = docTokens.length;
                for (const term in docFreq) {
                    globalIdf[term] = Math.log10(totalDocs / docFreq[term]) + 1; // +1 para evitar zero
                }

                // Cria a base final com vetores TF-IDF pré-calculados (otimiza a velocidade da busca)
                knowledgeBase = rawBlocks.map((block, i) => ({
                    text: block.replace(/\n/g, ' '),
                    vector: calculateTFIDF(docTokens[i])
                }));

                statusEl.textContent = `${knowledgeBase.length} vetores indexados.`;
                statusEl.classList.replace('text-emerald-200', 'text-white');
            } catch (error) {
                console.error(error);
                statusEl.textContent = "Falha na indexação.";
                statusEl.className = "text-xs text-red-200";
                addMessage("Erro crítico: Falha ao processar a matriz vetorial do texto.");
            }
        }

        function addMessage(htmlContent, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            const msgDiv = document.createElement('div');
            msgDiv.className = isUser 
                ? "bg-emerald-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-md message-appear"
                : "bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm message-appear";
            
            if (isUser) {
                msgDiv.textContent = htmlContent;
            } else {
                msgDiv.innerHTML = htmlContent;
            }
            
            wrapper.appendChild(msgDiv);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // 6. Motor de Busca Semântica (RAG Simples)
        function getBotResponse(input) {
            if (knowledgeBase.length === 0) return "Aguarde, estou construindo a matriz de similaridade...";

            const inputVector = calculateTFIDF(extractTokens(input));
            const results = [];

            // Compara a pergunta com TODOS os blocos vetorialmente
            for (const doc of knowledgeBase) {
                const score = cosineSimilarity(inputVector, doc.vector);
                if (score > 0.05) { // Filtro de ruído
                    results.push({ text: doc.text, score: score });
                }
            }

            // Ordena pelos mais relevantes
            results.sort((a, b) => b.score - a.score);

            // Se nenhuma similaridade matemática forte for encontrada
            if (results.length === 0 || results[0].score < 0.15) {
                return "Minha análise semântica não encontrou correlação forte para isso no texto. Tente reformular com termos mais presentes no documento.";
            }

            // INTELIGÊNCIA AVANÇADA: Se a pergunta for muito complexa e abranger duas partes diferentes do texto,
            // ele concatena as duas melhores respostas que fazem sentido (Similaridade > 40% da melhor resposta)
            const topScore = results[0].score;
            const topResults = results.filter(r => r.score >= topScore * 0.4).slice(0, 2);

            if (topResults.length === 1) {
                return topResults[0].text;
            }

            // Formatação visual para múltiplas fontes
            let combinedHtml = `Encontrei informações relevantes em <b>${topResults.length} partes</b> do texto:<br><br>`;
            topResults.forEach((res, index) => {
                combinedHtml += `<div class="response-part"><b>Fonte ${index + 1}:</b> ${res.text}</div>`;
            });
            return combinedHtml;
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = userInput.value;
            if (!message.trim()) return;

            addMessage(message, true);
            userInput.value = '';

            setTimeout(() => {
                const response = getBotResponse(message);
                addMessage(response, false);
            }, 500); // Delay um pouco maior para parecer que está "calculando"
        });

        window.onload = loadKnowledge;
    </script>
</body>
</html>
